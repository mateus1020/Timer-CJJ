<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timer CJJ</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Prompt:wght@400;500;700&display=swap"
    rel="stylesheet" />
</head>

<body data-timer-state="idle">
  <main class="app-shell">
    <section class="timer-panel">
      <div class="panel-top">
        <div class="buttons">
          <button type="button" data-seconds="30" onclick="startTimer(30)">30 seg</button>
          <button type="button" data-seconds="60" onclick="startTimer(60)">1 min</button>
          <button type="button" data-seconds="120" onclick="startTimer(120)">2 min</button>
          <button type="button" data-seconds="180" onclick="startTimer(180)">3 min</button>
          <button type="button" data-seconds="240" onclick="startTimer(240)">4 min</button>
          <button type="button" data-seconds="300" onclick="startTimer(300)">5 min</button>
        </div>
      </div>

      <div class="display-frame">
        <div id="display" aria-live="polite">00:00</div>

        <div class="progress-area">
          <div class="progress-track" aria-hidden="true">
            <div id="progress-bar" class="progress-bar">
              <div class="coach-avatar" aria-hidden="true">
                <img src="professor-cjj.png" alt="" />
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="play-pause" class="primary" type="button" onclick="pauseTimer()">Iniciar</button>
        <button class="secondary" type="button" onclick="resetTimer()">Resetar</button>
      </div>
    </section>
  </main>

  <audio id="alarm" src="alarm.mp3.mp3" preload="auto"></audio>

  <script src="script.js"></script>
</body>

</html>
